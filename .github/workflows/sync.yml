name: Sync from Yandex Disk

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов
  workflow_dispatch:          # или вручную кнопкой

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create folder structure
        run: |
          git config core.quotepath false
          # Создаём папки с .gitkeep если их ещё нет
          for dir in schedule avatars circles voices videos; do
            if [ ! -d "$dir" ]; then
              mkdir -p "$dir"
              touch "$dir/.gitkeep"
              echo "Created $dir/"
            fi
          done

      - name: Download files from Yandex Disk into schedule/
        run: |
          git config core.quotepath false
          PUBLIC_KEY="https://disk.yandex.ru/d/mjhoc7kysmQEuQ"
          
          python3 << 'PYEOF'
          import json, sys, os, urllib.request, urllib.parse

          PUBLIC_KEY = "https://disk.yandex.ru/d/mjhoc7kysmQEuQ"
          ENCODED    = urllib.parse.quote(PUBLIC_KEY)

          list_url = f"https://cloud-api.yandex.net/v1/disk/public/resources?public_key={ENCODED}&limit=100"
          with urllib.request.urlopen(list_url, timeout=30) as r:
              data = json.load(r)

          os.makedirs("schedule", exist_ok=True)
          downloaded = 0

          for item in data["_embedded"]["items"]:
              if item["type"] != "file":
                  continue
              name = item["name"]
              if not name.lower().endswith((".doc", ".docx")):
                  continue

              enc_path = urllib.parse.quote(item["path"])
              dl_url   = f"https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key={ENCODED}&path={enc_path}"
              with urllib.request.urlopen(dl_url, timeout=30) as r:
                  href = json.load(r)["href"]
              with urllib.request.urlopen(href, timeout=90) as r2:
                  with open(os.path.join("schedule", name), "wb") as f:
                      f.write(r2.read())
              print(f"Downloaded: schedule/{name}")
              downloaded += 1

          print(f"Total: {downloaded} files")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git config core.quotepath false
          git add .
          git diff --cached --quiet || git commit -m "Sync schedule files $(date +'%Y-%m-%d %H:%M')"
          git push
